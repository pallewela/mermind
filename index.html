<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindmap (Mermaid → Beautiful)</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://esm.sh" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir/dist/style.css" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (location.protocol === "file:") {
        document.getElementById("root").innerHTML =
          '<div class="fileProtocolHelp">' +
          "<h1>Cannot open this app from a saved file</h1>" +
          "<p>Browsers block ES modules on <code>file://</code> URLs. Run <code>npm install</code> then <code>npm run dev</code>, or open the built files from <code>npm run build</code> via an HTTP server.</p>" +
          "</div>";
      }
    </script>
    <!-- Vite uses this tag as the app entry (bundles npm deps like @codemirror/* for production). -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
